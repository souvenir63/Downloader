name: Build All Platforms

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # 即使某个平台打包失败，其他平台也会继续完成
      matrix:
        include:
          # 1. Windows 平台
          - os: windows-latest
            name: Windows版
            build_cmd: pyinstaller --noconfirm --onedir --windowed --icon="app_icon.ico" --add-data "pw_browsers;pw_browsers" "全能解析下载器_Claude.py"
            artifact_path: dist/全能解析下载器_Claude
          # 2. 苹果 Intel 芯片平台
          - os: macos-13
            name: Mac_Intel版
            build_cmd: pyinstaller --noconfirm --windowed --icon="app_icon.icns" --add-data "pw_browsers:pw_browsers" "全能解析下载器_Claude.py"
            artifact_path: dist/全能解析下载器_Claude.app
          # 3. 苹果 M 系列芯片平台 (Apple Silicon)
          - os: macos-latest
            name: Mac_M芯片版
            build_cmd: pyinstaller --noconfirm --windowed --icon="app_icon.icns" --add-data "pw_browsers:pw_browsers" "全能解析下载器_Claude.py"
            artifact_path: dist/全能解析下载器_Claude.app

    steps:
    - name: 1. 拉取你的代码
      uses: actions/checkout@v4

    - name: 2. 安装 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安装第三方库和打包工具
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller pillow

    - name: 4. 下载对应平台的 Chromium 浏览器
      env:
        PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw_browsers
      run: playwright install chromium

    - name: 5. 自动转换 Mac 图标格式 (仅限 macOS 执行)
      if: runner.os == 'macOS'
      run: python -c "from PIL import Image; Image.open('app_icon.ico').save('app_icon.icns')"

    - name: 6. 开始执行打包！
      env:
        PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw_browsers
      run: ${{ matrix.build_cmd }}

    - name: 7. 上传打包好的软件
      uses: actions/upload-artifact@v4
      with:
        name: 全能解析下载器_${{ matrix.name }}
        path: ${{ matrix.artifact_path }}
